<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentscreening — Zorgzaam Scheiden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF6F0;
    --paper:#FFFFFF;
    --line:#E8E1D6;
    --ink:#2B2825;
    --ink-soft:#6B6358;
    --coral:#E8714A;
    --coral-dark:#C75A38;
    --sage:#6B8F71;
    --amber:#D9A04B;
    --terra:#C75D4D;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    line-height:1.55;
  }
  .wrap{max-width:720px;margin:0 auto;padding:64px 24px 120px;}
  h1{
    font-family:'Source Serif 4', serif;
    font-weight:600;
    font-size:2rem;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  .sub{color:var(--ink-soft);margin:0 0 48px;font-size:1.05rem;}
  .sub strong{color:var(--ink);font-weight:500;}

  .dropzone{
    border:1.5px dashed var(--line);
    border-radius:14px;
    background:var(--paper);
    padding:48px 24px;
    text-align:center;
    cursor:pointer;
    transition:border-color .2s, background .2s;
    position:relative;
  }
  .dropzone.drag{border-color:var(--coral);background:#FFF8F4;}
  .dropzone input{display:none;}
  .dropicon{
    width:40px;height:40px;margin:0 auto 16px;
    border-radius:50%;
    background:var(--coral);
    display:flex;align-items:center;justify-content:center;
  }
  .dropicon svg{width:18px;height:18px;stroke:#fff;}
  .dropzone p{margin:0;color:var(--ink-soft);}
  .dropzone .filename{color:var(--ink);font-weight:500;margin-top:4px;}

  button.primary{
    margin-top:24px;
    width:100%;
    padding:14px 20px;
    background:var(--coral);
    color:#fff;
    border:none;
    border-radius:10px;
    font-size:1rem;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  button.primary:hover{background:var(--coral-dark);}
  button.primary:active{transform:scale(0.99);}
  button.primary:disabled{background:#D8CFC2;cursor:not-allowed;}

  /* Scan-animatie: signature element tijdens analyse */
  .scanning{display:none;margin-top:40px;text-align:center;}
  .scanning.active{display:block;}
  .scan-doc{
    width:64px;height:80px;margin:0 auto 20px;
    border:1.5px solid var(--line);
    border-radius:6px;
    background:var(--paper);
    position:relative;
    overflow:hidden;
  }
  .scan-doc::before, .scan-doc::after{
    content:'';position:absolute;left:12px;right:12px;height:2px;background:var(--line);
  }
  .scan-doc::before{top:18px;}
  .scan-doc::after{top:30px;}
  .scan-line{
    position:absolute;left:0;right:0;height:2px;background:var(--coral);
    box-shadow:0 0 8px var(--coral);
    animation:scan 1.6s ease-in-out infinite;
  }
  @keyframes scan{
    0%{top:6px;opacity:0;}
    10%{opacity:1;}
    90%{opacity:1;}
    100%{top:74px;opacity:0;}
  }
  .scanning p{color:var(--ink-soft);font-size:.95rem;margin:0;}

  .error{
    margin-top:24px;padding:16px 18px;border-radius:10px;
    background:#FCEFEC;border:1px solid #F0C8BE;color:var(--terra);font-size:.95rem;
  }

  .report{display:none;margin-top:56px;}
  .report.active{display:block;}
  .report-head{margin-bottom:32px;}
  .report-head .doctype{
    display:inline-block;font-family:'IBM Plex Mono', monospace;font-size:.75rem;
    letter-spacing:.04em;text-transform:uppercase;color:var(--coral-dark);
    background:#FFF1EA;padding:4px 10px;border-radius:6px;margin-bottom:10px;
  }
  .report-head p{margin:0;color:var(--ink-soft);}

  .section{margin-bottom:40px;}
  .section h2{
    font-family:'Source Serif 4', serif;font-weight:600;font-size:1.3rem;
    margin:0 0 16px;padding-bottom:8px;border-bottom:1px solid var(--line);
  }
  .card{
    background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--line);
    border-radius:8px;padding:16px 18px;margin-bottom:10px;
  }
  .card.sev-laag, .card.status-aanwezig{border-left-color:var(--sage);}
  .card.sev-midden, .card.status-onvolledig{border-left-color:var(--amber);}
  .card.sev-hoog, .card.status-ontbreekt{border-left-color:var(--terra);}
  .card .label{font-weight:600;font-size:.95rem;}
  .card .meta{color:var(--ink-soft);font-size:.85rem;margin-top:2px;}
  .card .cite{
    display:inline-block;margin-top:8px;font-family:'IBM Plex Mono', monospace;
    font-size:.8rem;color:var(--coral-dark);background:#FFF1EA;padding:2px 8px;border-radius:4px;
  }
  .empty{color:var(--ink-soft);font-size:.9rem;font-style:italic;}
  .samenvatting{
    background:#FFF8F4;border:1px solid #F0DCCB;border-radius:10px;padding:18px 20px;
    font-size:1.02rem;
  }

  .tabs{display:flex;gap:4px;margin-bottom:40px;border-bottom:1px solid var(--line);}
  .tab{
    padding:10px 4px;margin-right:24px;background:none;border:none;font-family:inherit;
    font-size:.95rem;font-weight:500;color:var(--ink-soft);cursor:pointer;
    border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .tab.active{color:var(--coral-dark);border-bottom-color:var(--coral);}
  .view{display:none;}
  .view.active{display:block;}

  .item-row{display:flex;align-items:flex-start;gap:10px;}
  .item-row input[type=checkbox]{
    margin-top:3px;width:18px;height:18px;accent-color:var(--sage);cursor:pointer;flex:none;
  }
  .item-body{flex:1;}
  .opmerking{
    margin-top:8px;width:100%;font-family:inherit;font-size:.85rem;color:var(--ink);
    border:1px solid var(--line);border-radius:6px;padding:8px 10px;resize:vertical;min-height:34px;
    background:#FCFAF7;
  }
  .opmerking::placeholder{color:#B6AC9C;}

  .actiebalk{display:flex;gap:12px;margin-top:32px;flex-wrap:wrap;}
  button.secundair{
    padding:12px 20px;background:var(--paper);color:var(--coral-dark);
    border:1.5px solid var(--coral);border-radius:10px;font-size:.95rem;font-weight:600;
    font-family:inherit;cursor:pointer;transition:background .15s;
  }
  button.secundair:hover{background:#FFF1EA;}
  button.secundair:disabled{opacity:.5;cursor:not-allowed;}
  .opslagstatus{align-self:center;color:var(--ink-soft);font-size:.85rem;}

  .historylijst{display:flex;flex-direction:column;gap:10px;}
  .history-item{
    background:var(--paper);border:1px solid var(--line);border-radius:10px;
    padding:16px 18px;cursor:pointer;transition:border-color .15s;
  }
  .history-item:hover{border-color:var(--coral);}
  .history-item .naam{font-weight:600;}
  .history-item .meta{color:var(--ink-soft);font-size:.85rem;margin-top:2px;}
  .history-item .samen{color:var(--ink-soft);font-size:.9rem;margin-top:6px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Documentscreening</h1>
  <p class="sub">Upload een <strong>concept-convenant</strong> of <strong>ouderschapsplan</strong> (.docx of .pdf). Je krijgt een check op grammatica, juridische juistheid, volledigheid en balans tussen partijen.</p>

  <div class="tabs">
    <button class="tab active" data-tab="nieuw">Nieuwe analyse</button>
    <button class="tab" data-tab="opgeslagen">Opgeslagen analyses</button>
  </div>

  <div class="view active" id="view-nieuw">
  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept=".docx,.pdf">
    <div class="dropicon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v3a2 2 0 002 2h12a2 2 0 002-2v-3"/></svg></div>
    <p id="dropText">Klik om een bestand te kiezen, of sleep het hierheen</p>
  </div>

  <button class="primary" id="analyseBtn" disabled>Analyseer document</button>

  <div class="scanning" id="scanning">
    <div class="scan-doc"><div class="scan-line"></div></div>
    <p id="scanText">Tekst uit het document halen...</p>
  </div>

  <div class="error" id="error" style="display:none;"></div>

  <div class="report" id="report"></div>
  </div>

  <div class="view" id="view-opgeslagen">
    <div id="historyList" class="historylijst"><p class="empty">Bezig met laden...</p></div>
  </div>
</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const dropText = document.getElementById('dropText');
const analyseBtn = document.getElementById('analyseBtn');
const scanning = document.getElementById('scanning');
const scanText = document.getElementById('scanText');
const errorBox = document.getElementById('error');
const report = document.getElementById('report');

let gekozenBestand = null;
let huidigeId = null;          // null = nog niet opgeslagen
let huidigeBestandsnaam = null;
let huidigeClassificatie = null;
let huidigRapport = null;

// ---------- Tabs ----------
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'opgeslagen') laadHistory();
  });
});

// ---------- Upload ----------
dropzone.addEventListener('click', () => fileInput.click());
['dragover','dragenter'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add('drag'); }));
['dragleave','drop'].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove('drag'); }));
dropzone.addEventListener('drop', e => { if (e.dataTransfer.files[0]) zetBestand(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files[0]) zetBestand(e.target.files[0]); });

function zetBestand(file) {
  gekozenBestand = file;
  dropText.innerHTML = `<span class="filename">${file.name}</span>`;
  analyseBtn.disabled = false;
}

analyseBtn.addEventListener('click', async () => {
  if (!gekozenBestand) return;
  errorBox.style.display = 'none';
  report.classList.remove('active');
  analyseBtn.disabled = true;
  scanning.classList.add('active');
  scanText.textContent = 'Tekst uit het document halen en analyseren...';

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(gekozenBestand);
    });

    const res = await fetch('/api/screen', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: gekozenBestand.name, content_base64: base64 }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Onbekende fout');

    huidigeId = null;
    huidigeBestandsnaam = gekozenBestand.name;
    voegStandaardveldenToe(json.rapport);
    toonRapport(json.classificatie, json.rapport);
  } catch (err) {
    errorBox.textContent = 'Kon het document niet analyseren: ' + err.message;
    errorBox.style.display = 'block';
  } finally {
    scanning.classList.remove('active');
    analyseBtn.disabled = false;
  }
});

// Elk item krijgt afgehandeld/opmerking, ook als het net van Claude komt.
function voegStandaardveldenToe(rapport) {
  for (const cat of ['grammatica', 'juridisch', 'volledigheid', 'balans']) {
    (rapport[cat] || []).forEach(item => {
      if (item.afgehandeld === undefined) item.afgehandeld = false;
      if (item.opmerking === undefined) item.opmerking = '';
    });
  }
}

function lijst(items, render, lege_tekst) {
  if (!items || items.length === 0) return `<p class="empty">${lege_tekst}</p>`;
  return items.map(render).join('');
}

// Bouwt één kaart met vinkje + opmerkingenveld. `categorie` + `index` zorgen
// dat de inputs het juiste item in huidigRapport bijwerken.
function kaart(categorie, index, extraClass, koptekstHtml, bodyHtml, citaatHtml) {
  const item = huidigRapport[categorie][index];
  return `
    <div class="card ${extraClass}">
      <div class="item-row">
        <input type="checkbox" ${item.afgehandeld ? 'checked' : ''}
          onchange="huidigRapport.${categorie}[${index}].afgehandeld = this.checked">
        <div class="item-body">
          <div class="label">${koptekstHtml}</div>
          ${bodyHtml ? `<div class="meta">${bodyHtml}</div>` : ''}
          ${citaatHtml || ''}
          <textarea class="opmerking" placeholder="Opmerking toevoegen..."
            oninput="huidigRapport.${categorie}[${index}].opmerking = this.value">${item.opmerking || ''}</textarea>
        </div>
      </div>
    </div>`;
}

function toonRapport(classificatie, rapportData) {
  huidigeClassificatie = classificatie;
  huidigRapport = rapportData;

  report.innerHTML = `
    <div class="report-head">
      <span class="doctype">${classificatie.doc_type}</span>
      <p>${classificatie.samenvatting}</p>
    </div>

    <div class="section">
      <h2>Samenvatting</h2>
      <div class="samenvatting">${huidigRapport.samenvatting}</div>
    </div>

    <div class="section">
      <h2>Volledigheid</h2>
      ${lijst(huidigRapport.volledigheid, (v, i) => kaart('volledigheid', i, 'status-' + v.status,
          v.sectie, `${v.status} — ${v.toelichting}`), 'Geen volledigheidscontrole beschikbaar.')}
    </div>

    <div class="section">
      <h2>Juridische juistheid</h2>
      ${lijst(huidigRapport.juridisch, (j, i) => kaart('juridisch', i, 'sev-' + j.ernst,
          j.onderwerp, j.bevinding, j.citaat ? `<span class="cite">${j.citaat}</span>` : ''), 'Geen juridische opmerkingen.')}
    </div>

    <div class="section">
      <h2>Balans tussen partijen</h2>
      ${lijst(huidigRapport.balans, (b, i) => kaart('balans', i, 'sev-' + b.ernst,
          b.signalering, ''), 'Geen onevenwichtigheden gesignaleerd.')}
    </div>

    <div class="section">
      <h2>Grammatica &amp; taal</h2>
      ${lijst(huidigRapport.grammatica, (g, i) => kaart('grammatica', i, '',
          g.locatie, `${g.probleem} → <em>${g.suggestie}</em>`), 'Geen taalkundige opmerkingen.')}
    </div>

    <div class="actiebalk">
      <button class="secundair" id="opslaanBtn">Opslaan</button>
      <button class="secundair" id="downloadBtn">Download als Word</button>
      <span class="opslagstatus" id="opslagStatus"></span>
    </div>
  `;
  report.classList.add('active');

  document.getElementById('opslaanBtn').addEventListener('click', opslaan);
  document.getElementById('downloadBtn').addEventListener('click', downloadWord);
}

async function opslaan() {
  const status = document.getElementById('opslagStatus');
  status.textContent = 'Opslaan...';
  try {
    const res = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        id: huidigeId,
        bestandsnaam: huidigeBestandsnaam,
        classificatie: huidigeClassificatie,
        rapport: huidigRapport,
      }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Onbekende fout');
    huidigeId = json.id;
    status.textContent = 'Opgeslagen ✓ (terug te vinden onder "Opgeslagen analyses")';
  } catch (err) {
    status.textContent = 'Opslaan mislukt: ' + err.message;
  }
}

async function downloadWord() {
  const status = document.getElementById('opslagStatus');
  status.textContent = 'Word-bestand maken...';
  try {
    const res = await fetch('/api/export-docx', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bestandsnaam: huidigeBestandsnaam,
        classificatie: huidigeClassificatie,
        rapport: huidigRapport,
      }),
    });
    if (!res.ok) {
      const json = await res.json();
      throw new Error(json.error || 'Onbekende fout');
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `screening-${(huidigeBestandsnaam || 'rapport').replace(/\.[^.]+$/, '')}.rtf`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    status.textContent = '';
  } catch (err) {
    status.textContent = 'Download mislukt: ' + err.message;
  }
}

// ---------- Opgeslagen analyses ----------
async function laadHistory() {
  const lijstEl = document.getElementById('historyList');
  lijstEl.innerHTML = '<p class="empty">Bezig met laden...</p>';
  try {
    const res = await fetch('/api/screenings');
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Onbekende fout');
    if (json.screeningen.length === 0) {
      lijstEl.innerHTML = '<p class="empty">Nog geen opgeslagen analyses.</p>';
      return;
    }
    lijstEl.innerHTML = json.screeningen.map(s => `
      <div class="history-item" data-id="${s.id}">
        <div class="naam">${s.bestandsnaam}</div>
        <div class="meta">${s.classificatie?.doc_type ?? ''} — ${new Date(s.updated_at).toLocaleString('nl-NL')}</div>
        <div class="samen">${s.classificatie?.samenvatting ?? ''}</div>
      </div>`).join('');
    lijstEl.querySelectorAll('.history-item').forEach(el => {
      el.addEventListener('click', () => laadScreening(el.dataset.id));
    });
  } catch (err) {
    lijstEl.innerHTML = `<p class="empty">Kon de lijst niet laden: ${err.message}</p>`;
  }
}

async function laadScreening(id) {
  try {
    const res = await fetch('/api/screening?id=' + id);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Onbekende fout');

    huidigeId = data.id;
    huidigeBestandsnaam = data.bestandsnaam;
    voegStandaardveldenToe(data.rapport);

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelector('.tab[data-tab="nieuw"]').classList.add('active');
    document.getElementById('view-nieuw').classList.add('active');

    toonRapport(data.classificatie, data.rapport);
  } catch (err) {
    alert('Kon de analyse niet laden: ' + err.message);
  }
}
</script>
</body>
</html>
